<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Digital Clock & Stopwatch</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#141e30,#243b55);display:flex;justify-content:center;align-items:center;height:100vh;color:#fff}
.box{background:rgba(255,255,255,.12);padding:30px;border-radius:20px;backdrop-filter:blur(10px);text-align:center;width:340px}
h1{margin:10px 0}#clock{font-size:42px;font-weight:bold;margin:15px 0}
#date{opacity:.8}.sw{font-size:36px;margin:20px 0}
button{padding:10px 18px;margin:5px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.start{background:#2ecc71}.stop{background:#e74c3c;color:#fff}.reset{background:#3498db;color:#fff}
</style></head>
<body><div class="box">
<h1>🕒 Digital Clock</h1>
<div id="clock"></div><div id="date"></div>
<hr style="margin:20px 0;border-color:#ffffff33">
<h1>⏱ Stopwatch</h1>
<div id="sw" class="sw">00:00:00</div>
<button class="start" onclick="start()">Start</button>
<button class="stop" onclick="stop()">Stop</button>
<button class="reset" onclick="resetSW()">Reset</button>
</div>
<script>
function updateClock(){
const n=new Date();
document.getElementById('clock').textContent=n.toLocaleTimeString();
document.getElementById('date').textContent=n.toDateString();
}
setInterval(updateClock,1000);updateClock();

let ms=0,timer=null;
function fmt(v){return String(v).padStart(2,'0')}
function render(){
let s=Math.floor(ms/100),sec=s%60,min=Math.floor(s/60)%60,hr=Math.floor(s/3600);
document.getElementById('sw').textContent=`${fmt(hr)}:${fmt(min)}:${fmt(sec)}`;
}
function start(){
if(timer)return;
timer=setInterval(()=>{ms++;render();},10);
}
function stop(){clearInterval(timer);timer=null;}
function resetSW(){stop();ms=0;render();}
render();
</script></body></html>
